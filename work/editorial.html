  <title>Editorial Design — JINHA KANG</title>

  <script>
  /* ================================================================
     ANIMATED FAVICON (manual frame-cycling — most browsers only
     render the first frame of an animated GIF favicon natively)
     ================================================================ */
  (function () {
    const favicon = document.querySelector('link[rel="icon"]');
    if (!favicon) return;
    const base = favicon.href.replace(/[^/]*$/, 'favicon-frames/f');
    let frame = 0;
    setInterval(() => {
      frame = (frame + 1) % 30;
      favicon.href = base + String(frame).padStart(2, '0') + '.png';
    }, 80);
  })();
  </script>

  <style>
    /* ══════════════════════════════════════
       RESET & TOKENS — mirrors index.html
    ══════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:    #ffffff;
      --fg:    #0c0c0c;
      --mid:   #7a7a7a;
      --faint: #F5F5F7;
      --border: rgba(12,12,12,.09);
    }

    html, body {
      width: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Urbanist', sans-serif;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    a { color: inherit; text-decoration: none; }
    img, video { display: block; max-width: 100%; }

    /* ── CUSTOM CURSOR (identical to index.html) ── */
    body { cursor: none; }
    #cursor-ring {
      position: fixed; top: 0; left: 0; z-index: 10001;
      width: 36px; height: 36px;
      border: 1.5px solid var(--fg);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: width .18s ease, height .18s ease, opacity .18s ease, border-color .18s ease;
      mix-blend-mode: multiply;
    }
    #cursor-dot {
      position: fixed; top: 0; left: 0; z-index: 10001;
      width: 5px; height: 5px;
      background: var(--fg); border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
    }
    body:not(.mouse-moved) #cursor-ring,
    body:not(.mouse-moved) #cursor-dot { opacity: 0; }

    /* ── NAV ── */
    nav {
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(6px);
      top: 0;
      width: 100%;
      border-radius: 0;
      position: fixed;
      z-index: 1000;
      transition: background 0.3s ease;
      height: 82px;
    }
    nav.scrolled {
      background: rgba(255,255,255,0.5);
      backdrop-filter: blur(6px);
    }
    .nav {
      display: flex;
      flex-direction: column;
      gap: 0px;
      align-items: flex-start;
      justify-content: flex-start;
      align-self: stretch;
      flex-shrink: 0;
      position: relative;
    }
    .nav-hug {
      padding: 10px 40px 10px 40px;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      align-self: stretch;
      flex-shrink: 0;
      height: 82px;
      position: relative;
    }
    .jinha-kang {
      color: #000000;
      text-align: left;
      font-family: 'Montserrat', sans-serif;
      font-size: 20px;
      line-height: 24px;
      font-weight: 500;
      position: relative;
      width: 130px;
    }
    .menu {
      list-style: none;
      display: flex;
      flex-direction: row;
      gap: 46px;
      align-items: center;
      justify-content: center;
      flex: 1;
      position: relative;
      z-index: 999;
    }
    .menu-item {
      color: #000000;
      text-align: left;
      font-family: 'Montserrat', sans-serif;
      font-size: 15px;
      line-height: 24px;
      font-weight: 400;
      position: relative;
      z-index: 999;
    }
    .nav-link { transition: 0.7s ease; }
    .nav-link:hover { color: #D3D3D3; }
    .linkedin {
      flex-shrink: 0;
      width: 30px;
      height: 30px;
      position: relative;
      object-fit: cover;
      aspect-ratio: 1;
    }
    .hamburger {
      display: none;
      cursor: pointer;
      z-index: 1000;
    }
    .bar {
      display: block;
      width: 25px;
      height: 3px;
      margin: 5px auto;
      transition: all 0.3s ease-in-out;
      background-color: black;
    }

    /* ── BACK LINK ── */
    .back-link {
      display: inline-flex; align-items: center; gap: 10px;
      font-size: 10px; font-weight: 500;
      letter-spacing: .22em; text-transform: uppercase;
      color: var(--mid);
      position: fixed; top: 50%; left: 40px; z-index: 100;
      transform: translateY(-50%);
      writing-mode: vertical-lr;
      text-orientation: mixed;
      transition: color 0.3s ease;
      opacity: 0;
      animation: fadeIn 1s ease 0.8s both;
    }
    .back-link:hover { color: var(--fg); }
    .back-link::before {
      content: '';
      display: block;
      width: 1px; height: 32px;
      background: var(--mid);
      margin-bottom: 10px;
      transition: background 0.3s ease;
    }
    .back-link:hover::before { background: var(--fg); }

    /* ══════════════════════════════════════
       HERO — editorial split layout
    ══════════════════════════════════════ */
    .project-hero {
      min-height: 100vh; padding-top: 82px;
      display: grid;
      grid-template-columns: 54% 46%;
    }

    /* LEFT */
    .hero-left {
      display: flex; flex-direction: column; justify-content: center;
      padding: 64px 52px 64px 80px;
      border-right: 1px solid var(--border);
      position: relative;
      container-type: inline-size;
      container-name: hero-left;
    }

    .project-eyebrow {
      font-size: 10px; font-weight: 500;
      letter-spacing: .28em; text-transform: uppercase;
      color: var(--mid); margin-bottom: 28px;
      animation: fadeUp .9s cubic-bezier(.22,1,.36,1) .1s both;
    }

    .project-title {
      font-family: 'Inter', sans-serif;
      font-size: clamp(52px, 14cqi, 108px);
      font-weight: 500;
      line-height: .88;
      letter-spacing: -.02em;
      text-transform: uppercase;
      margin-bottom: 48px;
      animation: fadeUp .9s cubic-bezier(.22,1,.36,1) .18s both;
    }

    .project-meta-row {
      display: flex; flex-direction: column; gap: 6px;
      margin-bottom: 48px;
      animation: fadeUp .9s cubic-bezier(.22,1,.36,1) .26s both;
    }
    .project-meta-row span {
      font-size: 13px; font-weight: 400;
      letter-spacing: .08em; color: var(--mid);
    }
    .project-meta-row strong {
      font-weight: 500; color: var(--fg);
    }

    .hero-tags {
      display: flex; flex-wrap: wrap; gap: 10px;
      animation: fadeUp .9s cubic-bezier(.22,1,.36,1) .34s both;
    }
    .hero-tag {
      font-size: 10px; font-weight: 500;
      letter-spacing: .18em; text-transform: uppercase;
      padding: 10px 18px;
      border: 1.5px solid var(--mid);
      color: var(--mid);
      border-radius: 50px;
      transition: border-color .2s, color .2s;
    }
    .hero-tag:hover { border-color: var(--fg); color: var(--fg); }

    .scroll-cta {
      position: absolute; right: 52px; bottom: 64px;
      display: flex; align-items: center; gap: 14px;
      font-size: 10px; font-weight: 500;
      letter-spacing: .22em; text-transform: uppercase;
      color: var(--mid);
      animation: fadeIn 1s ease .7s both;
    }
    .scroll-cta-btn {
      width: 48px; height: 48px; border-radius: 50%;
      border: 1.5px solid var(--fg); background: transparent;
      cursor: none; color: var(--fg);
      display: flex; align-items: center; justify-content: center;
      transition: background .28s, color .28s, transform .28s;
    }
    .scroll-cta-btn:hover {
      background: var(--fg); color: var(--bg); transform: scale(1.06);
    }

    /* RIGHT — hero image */
    .hero-right {
      position: relative; overflow: hidden;
      min-height: 420px;
    }
    .hero-right::before, .hero-right::after {
      content: ''; position: absolute; left: 0; right: 0; z-index: 2; pointer-events: none;
    }
    .hero-right::before {
      top: 0; height: 120px;
      background: linear-gradient(to bottom, var(--bg), transparent);
    }
    .hero-right::after {
      bottom: 0; height: 80px;
      background: linear-gradient(to top, var(--bg), transparent);
    }
    #hero-img-wrap {
      position: absolute; inset: 0; will-change: transform;
    }
    #hero-img-wrap img {
      width: 100%; height: 100%; object-fit: cover;
      animation: fadeIn 1.1s ease .35s both;
    }



    /* ══════════════════════════════════════
       CASE STUDY SECTION
    ══════════════════════════════════════ */
    #case-study {
      padding: 120px 80px 80px;
      max-width: 1280px; margin: 0 auto;
    }

    .section-label {
      font-size: 10px; font-weight: 500;
      letter-spacing: .28em; text-transform: uppercase;
      color: var(--mid); margin-bottom: 56px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--faint);
    }

    .case-study-grid {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 80px;
      align-items: start;
    }

    /* left: challenge / approach / decisions */
    .case-body {}

    .case-block {
      margin-bottom: 56px;
      opacity: 0;
      transform: translateY(24px);
      transition: opacity .7s cubic-bezier(.22,1,.36,1), transform .7s cubic-bezier(.22,1,.36,1);
    }
    .case-block.revealed { opacity: 1; transform: translateY(0); }

    .case-block-label {
      font-size: 10px; font-weight: 500;
      letter-spacing: .22em; text-transform: uppercase;
      color: var(--mid); margin-bottom: 16px;
    }

    .case-block-title {
      font-family: 'Inter', sans-serif;
      font-size: clamp(28px, 3.5vw, 48px);
      font-weight: 400; line-height: 1.05;
      letter-spacing: -.02em; margin-bottom: 20px;
    }

    .case-block p {
      font-size: 16px; line-height: 1.75;
      color: var(--fg); font-weight: 300;
      max-width: 620px;
    }

    .decision-list {
      list-style: none; margin-top: 24px;
      display: flex; flex-direction: column; gap: 24px;
    }
    .decision-item {
      padding: 24px;
      border: 1px solid var(--border);
      border-left: 3px solid var(--fg);
      transition: border-color .3s;
    }
    .decision-item:hover { border-color: var(--fg); }
    .decision-label {
      font-size: 10px; font-weight: 600;
      letter-spacing: .2em; text-transform: uppercase;
      margin-bottom: 8px;
    }
    .decision-text {
      font-size: 14px; line-height: 1.7;
      color: var(--mid); font-weight: 300;
    }

    /* right: aside specs */
    .case-aside {
      position: sticky; top: 100px;
    }
    .aside-block {
      padding: 28px 0;
      border-bottom: 1px solid var(--border);
      opacity: 0;
      transform: translateY(16px);
      transition: opacity .6s cubic-bezier(.22,1,.36,1), transform .6s cubic-bezier(.22,1,.36,1);
    }
    .aside-block.revealed { opacity: 1; transform: translateY(0); }
    .aside-block:first-child { padding-top: 0; }
    .aside-label {
      font-size: 10px; font-weight: 500;
      letter-spacing: .22em; text-transform: uppercase;
      color: var(--mid); margin-bottom: 10px;
    }
    .aside-value {
      font-size: 15px; font-weight: 400; line-height: 1.6;
    }

    .outcomes-stat {
      display: flex; align-items: baseline; gap: 6px;
      margin-top: 16px;
    }
    .stat-num {
      font-family: 'Inter', sans-serif;
      font-size: clamp(40px, 5vw, 60px);
      font-weight: 500;
      line-height: 1;
      letter-spacing: -.03em;
    }
    .stat-label {
      font-size: 11px; font-weight: 400;
      color: var(--mid); letter-spacing: .1em;
      text-transform: uppercase;
    }

    /* ══════════════════════════════════════
       GALLERY
    ══════════════════════════════════════ */
    #gallery {
      padding: 0 0 120px;
      border-top: 1px solid var(--faint);
    }

    .gallery-header {
      display: flex; align-items: flex-end; justify-content: space-between;
      padding: 80px 80px 48px;
      border-bottom: 1px solid var(--faint);
      max-width: 1280px; margin: 0 auto;
    }
    .gallery-heading {
      font-family: 'Inter', sans-serif;
      font-size: clamp(36px, 5vw, 64px);
      font-weight: 500; line-height: 1; letter-spacing: -.02em;
    }
    .gallery-count {
      font-size: 10px; font-weight: 500;
      letter-spacing: .22em; text-transform: uppercase;
      color: var(--mid);
    }

    .gallery-grid {
      max-width: 1280px; margin: 0 auto;
      padding: 48px 80px 0;
      display: grid;
      grid-template-columns: 1fr;
      gap: 2px;
    }

    .gallery-item {
      position: relative; overflow: hidden;
      background: #ffffff;
      cursor: none;
      opacity: 0;
      transform: translateY(32px);
      transition: opacity .8s cubic-bezier(.22,1,.36,1), transform .8s cubic-bezier(.22,1,.36,1);
    }
    .gallery-item.revealed { opacity: 1; transform: translateY(0); }

    .gallery-img-wrap {
      overflow: hidden; position: relative;
    }
    .gallery-img-wrap img {
      width: 100%; height: auto;
      display: block;
      transition: transform .65s cubic-bezier(.22,1,.36,1);
    }
    .gallery-item:hover .gallery-img-wrap img { transform: scale(1.03); }

    /* hover overlay */
    .gallery-overlay {
      position: absolute; inset: 0;
      background: rgba(12,12,12,.0);
      transition: background .4s ease;
      display: flex; align-items: flex-end; padding: 32px;
    }
    .gallery-item:hover .gallery-overlay { background: rgba(12,12,12,.04); }

    .gallery-caption {
      padding: 24px 0 8px;
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 16px;
      border-top: 1px solid var(--border);
      margin-top: 0;
    }
    .caption-title {
      font-size: 15px; font-weight: 500; line-height: 1.3;
    }
    .caption-sub {
      font-size: 12px; color: var(--mid); margin-top: 4px;
      font-weight: 300;
    }
    .caption-num {
      font-family: 'Inter', sans-serif;
      font-size: 11px; font-weight: 500;
      letter-spacing: .18em; color: var(--mid);
      flex-shrink: 0; padding-top: 2px;
    }
    .caption-right {
      display: flex; flex-direction: column; align-items: flex-end; gap: 10px;
      flex-shrink: 0;
    }
    .article-link {
      font-size: 10px; font-weight: 500;
      letter-spacing: .14em; text-transform: uppercase;
      color: var(--mid);
      border: 1px solid var(--border);
      padding: 7px 12px;
      border-radius: 50px;
      transition: border-color .2s, color .2s;
      white-space: nowrap;
    }
    .article-link:hover { border-color: var(--fg); color: var(--fg); }

    /* ── LIGHTBOX ── */
    #lightbox {
      position: fixed; inset: 0; z-index: 9000;
      background: rgba(255,255,255,.94);
      backdrop-filter: blur(16px);
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      opacity: 0; pointer-events: none;
      transition: opacity .35s ease;
    }
    #lightbox.open { opacity: 1; pointer-events: all; }

    .lb-inner {
      position: relative;
      max-width: 1080px; width: 100%;
      display: flex; flex-direction: column; gap: 24px;
    }
    .lb-top {
      display: flex; align-items: center; justify-content: space-between;
    }
    .lb-meta { display: flex; flex-direction: column; gap: 4px; }
    .lb-title { font-size: 16px; font-weight: 500; }
    .lb-sub { font-size: 12px; color: var(--mid); font-weight: 300; }
    .lb-actions { display: flex; align-items: center; gap: 12px; }
    .lb-article {
      font-size: 10px; font-weight: 500;
      letter-spacing: .14em; text-transform: uppercase;
      color: var(--mid);
      border: 1.5px solid var(--mid);
      padding: 10px 16px;
      border-radius: 50px;
      transition: border-color .2s, color .2s;
      white-space: nowrap;
    }
    .lb-article:hover { border-color: var(--fg); color: var(--fg); }
    .lb-close {
      width: 40px; height: 40px; border-radius: 50%;
      border: 1.5px solid var(--fg);
      background: transparent; cursor: none;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, color .2s;
    }
    .lb-close:hover { background: var(--fg); color: var(--bg); }
    .lb-close svg { stroke: currentColor; }
    #lb-img { width: 100%; height: auto; max-height: 80vh; object-fit: contain; }

    /* ── FOOTER (matches index.html style) ── */
    footer {
      padding: 56px 80px;
      border-top: 1px solid var(--faint);
      display: flex; align-items: center; justify-content: space-between;
    }
    .footer-left {
      font-size: 10px; font-weight: 500;
      letter-spacing: .22em; text-transform: uppercase;
      color: var(--mid);
    }
    .footer-right {
      font-size: 12px; color: var(--mid);
    }

    /* ── KEYFRAMES ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY
